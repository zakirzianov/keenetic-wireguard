# Nginx конфигурация для прокси-сервера на 192.168.1.11
# Проксирование локальных сервисов с SSL-сертификатами

# Перенаправление HTTP -> HTTPS для главного домена
server {
    listen 80;
    server_name srvok.ckox;
    return 301 https://$server_name$request_uri;
}

# Главный сервис на порту 9898
server {
    listen 443 ssl;
    server_name srvok.ckox;

    ssl_certificate /etc/nginx/certs/srvok.ckox.crt;
    ssl_certificate_key /etc/nginx/certs/srvok.ckox.key;

    location / {
        proxy_pass http://host.docker.internal:9898;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Перенаправление HTTP -> HTTPS для keenetic
server {
    listen 80;
    server_name keenetic.srvok.ckox;
    return 301 https://$server_name$request_uri;
}

# Веб-интерфейс роутера Keenetic
server {
    listen 443 ssl;
    server_name keenetic.srvok.ckox;

    ssl_certificate /etc/nginx/certs/srvok.ckox.crt;
    ssl_certificate_key /etc/nginx/certs/srvok.ckox.key;

    location / {
        proxy_pass https://192.168.1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Перенаправление HTTP -> HTTPS для NAS
server {
    listen 80;
    server_name nas.srvok.ckox;
    return 301 https://$server_name$request_uri;
}

# NAS сервис на порту 9191
server {
